name: Secret Scan

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  local-secret-hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Repo hygiene scan
        run: python tools/check_public_repo_hygiene.py
