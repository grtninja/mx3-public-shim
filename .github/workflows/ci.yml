name: ci

on:
  push:
    paths:
      - 'public/mx3-public-shim/**'
  pull_request:
    paths:
      - 'public/mx3-public-shim/**'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: public/mx3-public-shim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
